<script>

let music = document.getElementById("bgMusic");
let btn = document.getElementById("musicBtn");

window.addEventListener("load", () => {

    music.volume = 0.5;

    music.play().catch(() => {
        console.log("Browser blocked autoplay");
    });

});


function toggleMusic(){

    if(music.paused){

        music.play();
        btn.innerHTML = "🔊";

    }else{

        music.pause();
        btn.innerHTML = "🔇";

    }

}
